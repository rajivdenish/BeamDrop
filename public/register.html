<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Register - Web Data Transfer</title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">⚡</div>
            <div class="auth-title">Register</div>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Create a password">
            </div>
            <div class="input-group">
                <label for="inviteToken">Invite Token</label>
                <input type="text" id="inviteToken" placeholder="Leave blank if first user (Admin)">
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>

        <p id="message"></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const inviteToken = document.getElementById('inviteToken').value;
            const messageEl = document.getElementById('message');

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, inviteToken })
            });
            const data = await res.json();

            messageEl.style.display = 'block';
            if (res.ok) {
                messageEl.className = "success-message";
                messageEl.innerText = "Welcome aboard! Redirecting...";
                setTimeout(() => window.location.href = '/login.html', 2000);
            } else {
                messageEl.className = "error-message";
                messageEl.innerText = data.error;
            }
        });
    </script>
</body>

</html>
